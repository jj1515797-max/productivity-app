<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생산성 앱</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; max-width: 680px; margin: 0 auto; padding: 1.5rem; background: #fff; color: #111; }
.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid #eee; }
.tab { padding: 8px 16px; font-size: 14px; border: none; background: none; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #111; border-bottom: 2px solid #111; font-weight: 500; }
.section { display: none; }
.section.active { display: block; }
.input-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.input-row input { flex: 1; padding: 8px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; }
.btn { padding: 8px 16px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
.btn-primary { background: #111; color: #fff; border-color: #111; }
.todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 6px; }
.todo-item.done span { text-decoration: line-through; color: #aaa; }
.todo-item span { flex: 1; font-size: 14px; }
.del-btn { font-size: 12px; color: #bbb; border: none; background: none; cursor: pointer; padding: 2px 6px; }
.memo-area { width: 100%; min-height: 300px; padding: 12px; font-size: 14px; line-height: 1.7; border: 1px solid #ddd; border-radius: 8px; resize: vertical; font-family: inherit; }
.save-hint { font-size: 12px; color: #aaa; margin-top: 6px; }
.habit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.habit-card { padding: 12px; border: 1px solid #eee; border-radius: 8px; }
.habit-name { font-size: 14px; font-weight: 500; margin-bottom: 8px; display: flex; justify-content: space-between; }
.dots { display: flex; gap: 4px; }
.dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; background: #f5f5f5; }
.dot.done { background: #111; border-color: #111; }
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat { background: #f9f9f9; border-radius: 8px; padding: 12px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 500; }
.stat-label { font-size: 12px; color: #888; margin-top: 2px; }
.empty { font-size: 14px; color: #bbb; padding: 24px 0; text-align: center; }
.section-title { font-size: 13px; color: #888; margin-bottom: 8px; font-weight: 500; }
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" onclick="switchTab('todo')">할일</button>
  <button class="tab" onclick="switchTab('habit')">습관</button>
  <button class="tab" onclick="switchTab('memo')">메모</button>
</div>
<div class="section active" id="tab-todo">
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">전체</div></div>
    <div class="stat"><div class="stat-num" id="stat-done">0</div><div class="stat-label">완료</div></div>
    <div class="stat"><div class="stat-num" id="stat-left">0</div><div class="stat-label">남은 것</div></div>
  </div>
  <div class="input-row">
    <input type="text" id="todo-input" placeholder="할 일 추가..." onkeydown="if(event.key==='Enter')addTodo()" />
    <button class="btn btn-primary" onclick="addTodo()">추가</button>
  </div>
  <div class="section-title">오늘 할 일</div>
  <div id="todo-list"></div>
</div>
<div class="section" id="tab-habit">
  <div class="input-row">
    <input type="text" id="habit-input" placeholder="새 습관... (예: 운동, 독서)" onkeydown="if(event.key==='Enter')addHabit()" />
    <button class="btn btn-primary" onclick="addHabit()">추가</button>
  </div>
  <div class="section-title">이번 주 (7일)</div>
  <div class="habit-grid" id="habit-grid"></div>
</div>
<div class="section" id="tab-memo">
  <textarea class="memo-area" id="memo-area" placeholder="자유롭게 메모하세요..." oninput="saveMemo()"></textarea>
  <div class="save-hint" id="save-hint">자동 저장됩니다</div>
</div>
<script>
let state = JSON.parse(localStorage.getItem('prod_app')||'{"todos":[],"habits":[],"memo":""}');
function save(){localStorage.setItem('prod_app',JSON.stringify(state));}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['todo','habit','memo'][i]===tab));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}
function addTodo(){const i=document.getElementById('todo-input');const t=i.value.trim();if(!t)return;state.todos.push({id:Date.now(),text:t,done:false});i.value='';save();renderTodos();}
function toggleTodo(id){const t=state.todos.find(t=>t.id===id);if(t){t.done=!t.done;save();renderTodos();}}
function deleteTodo(id){state.todos=state.todos.filter(t=>t.id!==id);save();renderTodos();}
function renderTodos(){
  const list=document.getElementById('todo-list');
  const todos=state.todos;
  const done=todos.filter(t=>t.done).length;
  document.getElementById('stat-total').textContent=todos.length;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-left').textContent=todos.length-done;
  if(!todos.length){list.innerHTML='<div class="empty">할 일을 추가해보세요</div>';return;}
  list.innerHTML=todos.map(t=>`<div class="todo-item ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})"/><span>${t.text}</span><button class="del-btn" onclick="deleteTodo(${t.id})">삭제</button></div>`).join('');
}
function addHabit(){const i=document.getElementById('habit-input');const n=i.value.trim();if(!n)return;state.habits.push({id:Date.now(),name:n,days:[false,false,false,false,false,false,false]});i.value='';save();renderHabits();}
function toggleDay(id,day){const h=state.habits.find(h=>h.id===id);if(h){h.days[day]=!h.days[day];save();renderHabits();}}
function deleteHabit(id){state.habits=state.habits.filter(h=>h.id!==id);save();renderHabits();}
function renderHabits(){
  const grid=document.getElementById('habit-grid');
  const days=['월','화','수','목','금','토','일'];
  if(!state.habits.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1">습관을 추가해보세요</div>';return;}
  grid.innerHTML=state.habits.map(h=>`<div class="habit-card"><div class="habit-name">${h.name}<button class="del-btn" onclick="deleteHabit(${h.id})">삭제</button></div><div style="font-size:11px;color:#aaa;margin-bottom:4px;">${days.join('  ')}</div><div class="dots">${h.days.map((d,i)=>`<div class="dot ${d?'done':''}" onclick="toggleDay(${h.id},${i})"></div>`).join('')}</div><div style="font-size:12px;color:#888;margin-top:6px;">${h.days.filter(Boolean).length}/7일</div></div>`).join('');
}
function saveMemo(){state.memo=document.getElementById('memo-area').value;save();const h=document.getElementById('save-hint');h.textContent='저장됨';setTimeout(()=>h.textContent='자동 저장됩니다',1000);}
document.getElementById('memo-area').value=state.memo;
renderTodos();renderHabits();
</script>
</body>
</html>
